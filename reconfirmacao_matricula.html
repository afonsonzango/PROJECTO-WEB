  
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reconfirmação de Matrícula | EduMatric</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
    background: linear-gradient(-45deg, #002366, #0047ab, #001a40, #0066ff);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
}
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
.glass{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen p-6">

<a href="index.html" class="absolute top-6 left-6 text-2xl hover:opacity-80">←</a>

<div class="glass p-8 rounded-2xl w-full max-w-2xl">

<h2 class="text-3xl font-bold mb-6 text-center">Reconfirmação de Matrícula</h2>

<!-- PROGRESS BAR -->
<div class="flex items-center justify-between mb-8">
    <div class="flex-1 text-center">
        <div class="w-10 h-10 rounded-full bg-green-500 mx-auto mb-2 flex items-center justify-center font-bold">1</div>
        <p class="text-sm">Buscar</p>
    </div>
    <div class="flex-1 h-1 mx-2 bg-green-500"></div>
    <div class="flex-1 text-center">
        <div class="w-10 h-10 rounded-full bg-green-500 mx-auto mb-2 flex items-center justify-center font-bold">2</div>
        <p class="text-sm">Atualizar</p>
    </div>
</div>


<!-- 🔎 FORMULÁRIO DE BUSCA -->
<form method="POST" class="flex flex-col gap-4">
<p class="text-sm text-blue-100 mb-2">Para reconfirmar sua matrícula, informe seus dados</p>

<input type="text" name="nome" placeholder="Nome Completo" required class="p-3 rounded text-black focus:outline-none focus:ring-2 focus:ring-white">
<input type="email" name="email" placeholder="Email" required class="p-3 rounded text-black focus:outline-none focus:ring-2 focus:ring-white">

<button type="submit" name="buscar" class="bg-white text-blue-900 p-3 rounded font-bold hover:bg-gray-100 transition">
Buscar Matrícula
</button>
</form>

<!-- 🔄 FORMULÁRIO DE RECONFIRMAÇÃO -->
<form method="POST" class="flex flex-col gap-4">

<input type="hidden" name="aluno_id" value="1">
<input type="hidden" name="atualizar" value="sim">
<input type="hidden" name="nome_anterior" value="Paulo">
<input type="hidden" name="curso_anterior" value="Informática">
<input type="hidden" name="classe_anterior" value="12º Classe">

<p class="text-sm text-blue-100 mb-4">Revise e atualize seus dados</p>

<div>
<label class="text-sm mb-1 block">Nome Completo</label>
<input type="text" name="nome" value="Paulo" required class="p-3 rounded text-black w-full">
</div>

<div>
<label class="text-sm mb-1 block">Email</label>
<input type="email" name="email" value="Paulo@gmail.com" required class="p-3 rounded text-black w-full">
</div>

<div>
<label class="text-sm mb-1 block">ID Oficial</label>
<input type="text" name="id_oficial" value="001" readonly class="p-3 rounded bg-gray-700 text-gray-300 w-full">
</div>

<div class="grid grid-cols-2 gap-3">
<div>
<label class="text-sm mb-1 block">Curso</label>
<select name="curso" required class="p-3 rounded text-black w-full">
<option value="Informática de Gestão" >Informática de Gestão</option>
<option value="Gestão Empresarial" >Gestão Empresarial</option>
<option value="Telecomunicações">Telecomunicações</option>
<option value="Eletricidade Industrial">Eletricidade Industrial</option>
</select>
</div>

<div>
<label class="text-sm mb-1 block">Classe</label>
<select name="classe" required class="p-3 rounded text-black w-full">
<option value="10ª" >10ª</option>
<option value="11ª">11ª</option>
<option value="12ª">12ª</option>
<option value="13ª">13ª</option>
</select>
</div>
</div>

<div>
<label class="text-sm mb-1 block">Período</label>
<select name="periodo" required class="p-3 rounded text-black w-full">
<option value="Manhã" >Manhã</option>
<option value="Tarde">Tarde</option>
<option value="Noite">Noite</option>
</select>
</div>

<div>
<label class="text-sm mb-1 block">Telefone (Opcional)</label>
<input type="tel" name="telefone"  class="p-3 rounded text-black w-full">
</div>

<div>
<label class="text-sm mb-1 block">Endereço (Opcional)</label>
<input type="text" name="endereco"  class="p-3 rounded text-black w-full">
</div>

<div class="flex gap-3">
<button type="submit" class="flex-1 bg-green-500 text-white p-3 rounded font-bold hover:bg-green-600 transition">
✅ Confirmar Reconfirmação
</button>
<button type="reset" onclick="window.location.href='reconfirmacao_matricula.html'" class="flex-1 bg-gray-600 text-white p-3 rounded font-bold hover:bg-gray-700 transition">
Cancelar
</button>
</div>

</form>

</div>

</body>
</html>
