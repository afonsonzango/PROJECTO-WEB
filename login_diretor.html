<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Diretor | EduMatric</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
    background: linear-gradient(-45deg, #1e3c72, #2a5298, #7e22ce, #3b82f6);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
}
@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.glass {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<a href="index.html" class="absolute top-6 left-6 text-white text-3xl hover:opacity-70 transition">←</a>

<div class="w-full max-w-md">
    <div class="glass p-8 rounded-2xl text-white">
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">🎓</div>
            <h1 class="text-3xl font-black">Portal do Diretor</h1>
            <p class="text-blue-100 text-sm mt-2">Acesso Administrativo</p>
        </div>

        <form method="POST" class="space-y-4">
            <div>
                <label class="text-sm font-semibold block mb-2">Usuário</label>
                <input type="text" name="usuario" value="diretor" required 
                    class="w-full bg-white/10 border border-white/20 rounded-lg py-3 px-4 text-white placeholder-blue-200 focus:outline-none focus:ring-2 focus:ring-white transition"
                    placeholder="diretor">
                <p class="text-xs text-blue-200 mt-1">Padrão: <strong>diretor</strong></p>
            </div>

            <div>
                <label class="text-sm font-semibold block mb-2">Senha</label>
                <input type="password" name="senha" required 
                    class="w-full bg-white/10 border border-white/20 rounded-lg py-3 px-4 text-white placeholder-blue-200 focus:outline-none focus:ring-2 focus:ring-white transition"
                    placeholder="Digite sua senha">
                <p class="text-xs text-blue-200 mt-1">Mínimo 6 caracteres. Na primeira vez, crie sua senha.</p>
            </div>

            <button type="submit" name="entrar" class="w-full bg-white text-blue-900 font-black py-3 rounded-lg hover:bg-blue-100 transition mt-6 text-lg">
                Entrar no Sistema
            </button>
        </form>

        <div class="mt-6 p-4 bg-blue-500/20 border border-blue-400/50 rounded text-blue-100 text-xs">
            <strong>ℹ️ Primeira Vez?</strong><br>
            Digite o usuário <strong>diretor</strong> e crie sua senha. O sistema criará sua conta automaticamente!
        </div>
    </div>
</div>

</body>
</html>
