<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login Aluno | EduMatric</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
    background: linear-gradient(-45deg, #002366, #0047ab, #001a40, #0066ff);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
}
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
.glass{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-6">
<a href="index.html" class="absolute top-6 left-6 text-2xl">←</a>

<div class="glass p-8 rounded-2xl w-full max-w-md">
<h2 class="text-3xl font-bold mb-6 text-center">Portal do Aluno</h2>

<form method="POST" class="flex flex-col gap-4">
<input type="text" name="id_oficial" id="id_oficial" placeholder="ID Oficial (ex: JORV123)" required class="p-3 rounded text-black">
<input type="email" name="email" placeholder="Email" id="email" required class="p-3 rounded text-black">
<button type="submit" class="bg-white text-blue-900 p-3 rounded font-bold hover:bg-gray-100" onclick="verificar()">Entrar</button>
</form>


<p class="text-center text-sm mt-4 text-blue-100">
    Não tem matrícula? <a href="fazer_matricula.html" class="text-white font-bold hover:underline">Faça aqui</a>
</p>
</div>
<script>
    let id = document.getElementById('id_oficial').value;
    let email = document.getElementById('email').value;
    function verificar(){
        if(id === '' && email === ''){
            alert('Id ou email incorreto');
        }
    }
</script>
</body>
</html>
