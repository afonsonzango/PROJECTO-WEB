<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fazer Matrícula | EduMatric</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background: linear-gradient(-45deg, #002366, #0047ab, #001a40, #0066ff);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
}
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
.glass{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen p-6">

<a href="index.html" class="absolute top-6 left-6 text-2xl">←</a>

<div class="glass p-8 rounded-2xl w-full max-w-3xl">

<h2 class="text-3xl font-bold mb-6 text-center">Formulário de Matrícula</h2>


<form method="POST" enctype="multipart/form-data" class="grid md:grid-cols-2 gap-6">

<input type="text" name="nome" placeholder="Nome Completo" required class="p-3 rounded text-black">

<select name="sexo" required class="p-3 rounded text-black">
<option value="">Sexo</option>
<option value="Masculino">Masculino</option>
<option value="Feminino">Feminino</option>
<option value="Outro">Outro</option>
</select>

<select name="curso" required class="p-3 rounded text-black">
<option value="">Curso</option>
<option value="Informática de Gestão">Informática de Gestão</option>
<option value="Gestão Empresarial">Gestão Empresarial</option>
<option value="Telecomunicações">Telecomunicações</option>
<option value="Eletricidade Industrial">Eletricidade Industrial</option>
</select>

<select name="classe" required class="p-3 rounded text-black">
<option value="">Classe</option>
<option value="10ª">10ª</option>
<option value="11ª">11ª</option>
<option value="12ª">12ª</option>
<option value="13ª">13ª</option>
</select>

<select name="periodo" required class="p-3 rounded text-black">
<option value="">Período</option>
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>
<option value="Noite">Noite</option>
</select>

<input type="text" name="nif" placeholder="Número de NIF" required class="p-3 rounded text-black">

<input type="tel" name="telefone" placeholder="Contacto" required class="p-3 rounded text-black">

<input type="text" name="escola" placeholder="Escola Anterior" required class="p-3 rounded text-black">

<input type="email" name="email" placeholder="Email" required class="p-3 rounded text-black md:col-span-2">

<div class="md:col-span-2">
<label class="text-white text-sm">Endereço (opcional)</label>
<input type="text" name="endereco" placeholder="Endereço" class="p-3 rounded text-black w-full">
</div>

<div class="md:col-span-2">
<label class="text-white text-sm">Foto de Passe (JPG/PNG, máx 10MB)</label>
<input type="file" name="foto" accept=".jpg,.jpeg,.png" required class="p-3 rounded text-black w-full">
</div>

<div class="md:col-span-2">
<label class="text-white text-sm">Certificado (PDF/JPG/PNG, máx 10MB)</label>
<input type="file" name="certificado" accept=".pdf,.jpg,.jpeg,.png" required class="p-3 rounded text-black w-full">
</div>

<button type="submit" class="bg-white text-blue-900 p-4 rounded font-bold md:col-span-2 hover:bg-gray-100">
Enviar Matrícula
</button>

</form>

</div>

</body>
</html>
